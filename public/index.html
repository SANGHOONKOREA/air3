<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-apple.png" />
    <title>Air3 Live</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 32px 20px;
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #16202b 0%, #0b0f14 60%);
        color: #e6edf3;
        text-align: center;
      }
      h1 { font-size: 26px; margin: 0; letter-spacing: 0.5px; }
      p.sub { margin: 0; color: #93a1b1; max-width: 420px; }
      .cards { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
      a.card {
        display: block;
        width: 240px;
        padding: 22px 20px;
        border-radius: 16px;
        text-decoration: none;
        color: #e6edf3;
        background: #131b24;
        border: 1px solid #223041;
        transition: transform 0.12s ease, border-color 0.12s ease;
      }
      a.card:hover { transform: translateY(-3px); border-color: #3b82f6; }
      a.card .ico { font-size: 34px; }
      a.card .title { font-size: 19px; font-weight: 600; margin-top: 8px; }
      a.card .desc { font-size: 13px; color: #93a1b1; margin-top: 4px; }
      footer { color: #5b6b7b; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Air3 Live</h1>
    <p class="sub">Air3 스마트글라스 → 사무실 실시간 영상. 현장은 송출, 사무실은 시청을 선택하세요.</p>
    <div class="cards">
      <a class="card" href="broadcaster.html">
        <div class="ico">📡</div>
        <div class="title">현장 송출</div>
        <div class="desc">Air3 카메라 화면을 사무실로 전송 (broadcaster)</div>
      </a>
      <a class="card" href="viewer.html">
        <div class="ico">🖥️</div>
        <div class="title">사무실 시청</div>
        <div class="desc">현장 화면을 실시간으로 시청 (viewer)</div>
      </a>
    </div>
    <footer>WebRTC · Cloudflare TURN · 지연 1초 내외</footer>
    <script src="config.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () =>
          navigator.serviceWorker.register('sw.js').catch(() => {})
        );
      }
    </script>
  </body>
</html>
