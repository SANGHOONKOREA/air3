# OPTIONAL — self-hosted coturn, only if you decide NOT to use Cloudflare TURN.
# With Cloudflare Realtime TURN (the default in this project) you do NOT need
# this file at all. Kept as a documented fallback.
#
# Install: sudo apt-get install -y coturn
# Enable:  set TURNSERVER_ENABLED=1 in /etc/default/coturn
# Open UDP/TCP 3478 and the relay range 49152-65535 in BOTH firewalls.

listening-port=3478
tls-listening-port=5349

# Public IP of this VM (Oracle: the instance public IPv4).
external-ip=REPLACE_WITH_VM_PUBLIC_IP

# Long-term credentials. Change these; they must match what the app hands out.
lt-cred-mech
user=air3:REPLACE_WITH_STRONG_PASSWORD
realm=air3-signal.snsys.net

# Relay port range (must be open in the cloud Security List + OS firewall).
min-port=49152
max-port=65535

fingerprint
no-cli
no-multicast-peers

# For turns: (TLS) provide certs (e.g. reuse Caddy/Let's Encrypt certs).
# cert=/etc/ssl/certs/air3-signal.pem
# pkey=/etc/ssl/private/air3-signal.key

log-file=/var/log/turnserver.log
simple-log
